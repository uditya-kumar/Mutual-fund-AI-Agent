<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutual Fund AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111;
            --bg-tertiary: #1a1a1a;
            --bg-input: #0a0a0a;
            --border-color: #2a2a2a;
            --text-primary: #e8e8e8;
            --text-secondary: #888;
            --text-strong: #fff;
            --user-bubble: #0084ff;
            --agent-bubble: #1a1a1a;
            --agent-avatar: #2a2a2a;
            --hover-bg: #252525;
            --scrollbar-thumb: #333;
            --code-bg: #0a0a0a;
            --spinner-track: #333;
        }

        body.light-mode {
            --bg-primary: #f5f5f5;
            --bg-secondary: #fff;
            --bg-tertiary: #f8f8f8;
            --bg-input: #fff;
            --border-color: #e0e0e0;
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --text-strong: #000;
            --user-bubble: #0084ff;
            --agent-bubble: #f0f0f0;
            --agent-avatar: #e0e0e0;
            --hover-bg: #e8e8e8;
            --scrollbar-thumb: #ccc;
            --code-bg: #f5f5f5;
            --spinner-track: #ddd;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            height: 100svh; /* Safe area viewport height for mobile */
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100svh; /* Safe area viewport height */
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-secondary);
            position: relative;
        }

        .header {
            padding: 16px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header-left h1 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-strong);
        }

        .header-left p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .theme-toggle {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-primary);
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            background: var(--hover-bg);
        }

        .theme-toggle .icon {
            font-size: 16px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 3px;
        }

        .message {
            display: flex;
            gap: 8px;
            max-width: 85%;
            animation: slideIn 0.2s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.agent {
            align-self: flex-start;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: var(--user-bubble);
        }

        .message.agent .avatar {
            background: var(--agent-avatar);
        }

        .message-content {
            background: var(--agent-bubble);
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            border: 1px solid var(--border-color);
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .message.user .message-content {
            background: var(--user-bubble);
            border-color: var(--user-bubble);
            color: #fff;
        }

        .status-message {
            align-self: flex-start;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--agent-bubble);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            font-size: 13px;
            color: var(--text-secondary);
            max-width: 300px;
        }

        .status-message .spinner {
            width: 12px;
            height: 12px;
            border: 2px solid var(--spinner-track);
            border-top-color: #0084ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .input-container {
            padding: 12px;
            background: var(--bg-tertiary);
            border-top: 1px solid var(--border-color);
            position: relative;
            flex-shrink: 0;
            padding-bottom: max(12px, env(safe-area-inset-bottom)); /* iOS safe area */
        }

        .autocomplete-dropdown {
            position: absolute;
            bottom: 100%;
            left: 12px;
            right: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            margin-bottom: 8px;
            z-index: 1000;
        }

        .autocomplete-dropdown.active {
            display: block;
        }

        .autocomplete-item {
            padding: 12px 16px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid var(--border-color);
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .autocomplete-item:hover,
        .autocomplete-item.selected {
            background: var(--hover-bg);
        }

        .autocomplete-item .fund-name {
            color: var(--text-primary);
            display: block;
        }

        .autocomplete-item .fund-code {
            color: var(--text-secondary);
            font-size: 11px;
            margin-top: 2px;
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        #messageInput {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 15px;
            resize: none;
            max-height: 100px;
            font-family: inherit;
            outline: none;
            min-height: 40px;
        }

        #messageInput:focus {
            border-color: #0084ff;
        }

        #sendButton {
            width: 40px;
            height: 40px;
            background: #0084ff;
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #sendButton:hover {
            background: #0073e6;
        }

        #sendButton:disabled {
            background: #2a2a2a;
            cursor: not-allowed;
        }

        .chart-container {
            margin: 12px 0;
            background: var(--code-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
        }

        pre {
            background: var(--code-bg);
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 13px;
            border: 1px solid var(--border-color);
        }

        code {
            font-family: 'Courier New', monospace;
        }

        /* Hyperlink styling in messages */
        .message-content a {
            color: #0084ff;
            text-decoration: underline;
            font-weight: 500;
            transition: color 0.2s;
        }

        .message-content a:hover {
            color: #0073e6;
            text-decoration: underline;
        }

        body.light-mode .message-content a {
            color: #0066cc;
        }

        body.light-mode .message-content a:hover {
            color: #0052a3;
        }

        /* Mobile optimizations */
        @media (max-width: 768px) {
            .header-left h1 {
                font-size: 16px;
            }

            .header-left p {
                font-size: 11px;
            }

            .theme-toggle {
                padding: 6px 10px;
                font-size: 12px;
            }

            .message {
                max-width: 90%;
            }

            .message-content {
                font-size: 13px;
            }

            .avatar {
                width: 28px;
                height: 28px;
                font-size: 14px;
            }

            .chart-container {
                padding: 12px;
                margin: 8px 0;
            }

            pre {
                font-size: 11px;
                padding: 8px;
            }
        }

        /* Prevent zoom on input focus (iOS) */
        @media (max-width: 768px) {
            #messageInput {
                font-size: 16px; /* Prevents iOS zoom */
            }

            #messageInput::placeholder {
                font-size: 13px;
            }
        }

        /* Handle viewport height changes on mobile keyboard */
        @supports (height: 100svh) {
            body, .container {
                height: 100svh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>🏦 Mutual Fund AI Assistant</h1>
            </div>
            <button class="theme-toggle" id="themeToggle">
                <span class="icon" id="themeIcon">🌙</span>
                <span id="themeText">Dark</span>
            </button>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message agent">
                <div class="avatar">🤖</div>
                <div class="message-content">
                    Hello! I'm your mutual fund advisor. I can help you:
                    <br>• Search and analyze mutual funds
                    <br>• Calculate returns and SIP projections
                    <br>• Compare funds and visualize trends
                    <br><br>Type @ to search for funds or just ask me anything!
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="autocomplete-dropdown" id="autocompleteDropdown"></div>
            <div class="input-wrapper">
                <textarea 
                    id="messageInput" 
                    placeholder="Type your message... (@ to search funds)"
                    rows="1"
                ></textarea>
                <button id="sendButton">
                    <span>➤</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const autocompleteDropdown = document.getElementById('autocompleteDropdown');

        let isProcessing = false;
        let autocompleteData = [];
        let selectedIndex = -1;
        let atSymbolPosition = -1;

        // Auto-resize textarea
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = messageInput.scrollHeight + 'px';
            
            handleAutocomplete();
        });

        // Handle autocomplete
        async function handleAutocomplete() {
            const text = messageInput.value;
            const cursorPos = messageInput.selectionStart;
            
            // Find @ symbol before cursor (allow spaces in search query)
            let atPos = -1;
            for (let i = cursorPos - 1; i >= 0; i--) {
                if (text[i] === '@') {
                    atPos = i;
                    break;
                }
                // Stop at newline but allow spaces
                if (text[i] === '\n') break;
            }

            if (atPos === -1) {
                autocompleteDropdown.classList.remove('active');
                atSymbolPosition = -1;
                return;
            }

            atSymbolPosition = atPos;
            const query = text.substring(atPos + 1, cursorPos).trim();

            if (query.length < 2) {
                autocompleteDropdown.classList.remove('active');
                return;
            }

            try {
                // Use local proxy to avoid CORS issues
                const response = await fetch(`/api/search-funds?query=${encodeURIComponent(query)}`);
                autocompleteData = await response.json();
                
                if (autocompleteData.length > 0) {
                    renderAutocomplete();
                    autocompleteDropdown.classList.add('active');
                } else {
                    autocompleteDropdown.classList.remove('active');
                }
            } catch (error) {
                console.error('Autocomplete error:', error);
                autocompleteDropdown.classList.remove('active');
            }
        }

        function renderAutocomplete() {
            autocompleteDropdown.innerHTML = autocompleteData
                .map((fund, index) => `
                    <div class="autocomplete-item ${index === selectedIndex ? 'selected' : ''}" data-index="${index}">
                        <span class="fund-name">${fund.schemeName}</span>
                        <span class="fund-code">${fund.category ? fund.category + ' • ' : ''}ID: ${fund.schemeCode}</span>
                    </div>
                `)
                .join('');

            // Add click handlers
            document.querySelectorAll('.autocomplete-item').forEach((item) => {
                item.addEventListener('click', () => {
                    selectAutocompleteItem(parseInt(item.dataset.index));
                });
            });
        }

        function selectAutocompleteItem(index) {
            if (index < 0 || index >= autocompleteData.length) return;

            const fund = autocompleteData[index];
            const text = messageInput.value;
            const beforeAt = text.substring(0, atSymbolPosition);
            const afterCursor = text.substring(messageInput.selectionStart);
            
            messageInput.value = `${beforeAt}${fund.schemeName} (${fund.schemeCode})${afterCursor}`;
            messageInput.focus();
            
            autocompleteDropdown.classList.remove('active');
            selectedIndex = -1;
            atSymbolPosition = -1;
        }

        // Keyboard navigation for autocomplete
        messageInput.addEventListener('keydown', (e) => {
            if (!autocompleteDropdown.classList.contains('active')) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
                return;
            }

            switch (e.key) {
                case 'ArrowDown':
                    e.preventDefault();
                    selectedIndex = Math.min(selectedIndex + 1, autocompleteData.length - 1);
                    renderAutocomplete();
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    selectedIndex = Math.max(selectedIndex - 1, 0);
                    renderAutocomplete();
                    break;
                case 'Enter':
                    e.preventDefault();
                    if (selectedIndex >= 0) {
                        selectAutocompleteItem(selectedIndex);
                    }
                    break;
                case 'Escape':
                    autocompleteDropdown.classList.remove('active');
                    selectedIndex = -1;
                    break;
            }
        });

        // Close autocomplete when clicking outside
        document.addEventListener('click', (e) => {
            if (!autocompleteDropdown.contains(e.target) && e.target !== messageInput) {
                autocompleteDropdown.classList.remove('active');
            }
        });

        function addMessage(content, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'agent'}`;
            
            messageDiv.innerHTML = `
                <div class="avatar">${isUser ? '👤' : '🤖'}</div>
                <div class="message-content">${content}</div>
            `;
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            return messageDiv;
        }

        function addStatusMessage(status, tool = '') {
            const statusDiv = document.createElement('div');
            statusDiv.className = 'status-message';
            
            let statusText = '';
            if (status === 'thinking') statusText = 'Thinking...';
            else if (status === 'tool_call') statusText = tool;
            else if (status === 'chart') statusText = 'Creating chart...';
            
            statusDiv.innerHTML = `
                <div class="spinner"></div>
                <span>${statusText}</span>
            `;
            
            chatContainer.appendChild(statusDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            return statusDiv;
        }

        async function sendMessage() {
            if (isProcessing || !messageInput.value.trim()) return;

            const message = messageInput.value.trim();
            messageInput.value = '';
            messageInput.style.height = 'auto';
            
            addMessage(message, true);
            
            isProcessing = true;
            sendButton.disabled = true;
            
            let statusElement = addStatusMessage('thinking');

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message }),
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.slice(6));

                            if (data.type === 'status') {
                                if (statusElement) statusElement.remove();
                                if (data.status === 'tool_call' && data.tool && data.tool.includes('Chart')) {
                                    statusElement = addStatusMessage('chart');
                                } else {
                                    statusElement = addStatusMessage(data.status, data.tool);
                                }
                            } else if (data.type === 'chart') {
                                statusElement.remove();
                                addMessage(renderChartLink(data.url));
                            } else if (data.type === 'message') {
                                statusElement.remove();
                                addMessage(processMessageContent(data.content));
                            } else if (data.type === 'done') {
                                statusElement.remove();
                            } else if (data.type === 'error') {
                                statusElement.remove();
                                addMessage('Sorry, an error occurred: ' + data.error);
                            }
                        }
                    }
                }
            } catch (error) {
                statusElement.remove();
                addMessage('Sorry, something went wrong. Please try again.');
                console.error('Error:', error);
            } finally {
                isProcessing = false;
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        function processMessageContent(content) {
            // Regular text formatting with markdown support
            return content
                .replace(/\n/g, '<br>')
                // Markdown links: [text](url)
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                // Bold: **text**
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                // Inline code: `code`
                .replace(/`(.*?)`/g, '<code>$1</code>');
        }

        function renderChartLink(url) {
            return `<div class="chart-container"><a href="${url}" target="_blank"><img src="${url}" alt="Chart" style="max-width: 100%; border-radius: 8px;"></a></div>`;
        }

        sendButton.addEventListener('click', sendMessage);

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !autocompleteDropdown.classList.contains('active')) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Focus input on load
        messageInput.focus();

        // Theme toggle functionality
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');

        // Check for saved theme preference
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
            themeIcon.textContent = '☀️';
            themeText.textContent = 'Light';
        }

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            
            themeIcon.textContent = isLight ? '☀️' : '🌙';
            themeText.textContent = isLight ? 'Light' : 'Dark';
            
            // Save preference
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        });
    </script>
</body>
</html>
